<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>HEMOGEN</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family: Arial;
  background:black;
  color:white;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

h1{font-size:50px}
.red{color:red}

.card{
  background:#111;
  border:1px solid #300;
  padding:20px;
  border-radius:15px;
  margin-bottom:15px;
}

button{
  background:red;
  border:none;
  padding:10px 15px;
  color:white;
  border-radius:10px;
  cursor:pointer;
}

input, textarea{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:10px;
  border:none;
  background:#222;
  color:white;
}

.top{
  display:flex;
  justify-content:space-between;
  padding:15px;
  border-bottom:1px solid #300;
}
</style>
</head>

<body>

<div class="top">
  <strong>HEMOGEN</strong>
  <button onclick="toggleAdmin()">Admin</button>
</div>

<div class="container" id="site">

<h1>HEMO<span class="red">GEN</span></h1>
<p>Consultoria em Hemovigilância</p>

<h2>Biblioteca</h2>
<div id="lista"></div>

</div>

<div class="container" id="admin" style="display:none">

<h2>Painel de Artigos</h2>

<input id="titulo" placeholder="Título">
<textarea id="descricao" placeholder="Descrição"></textarea>

<button onclick="add()">Adicionar</button>

<h3>Artigos</h3>
<div id="adminLista"></div>

</div>

<script>
let artigos = JSON.parse(localStorage.getItem("artigos")) || [];

function salvar(){
  localStorage.setItem("artigos", JSON.stringify(artigos));
}

function render(){
  let lista = document.getElementById("lista");
  let adminLista = document.getElementById("adminLista");

  lista.innerHTML="";
  adminLista.innerHTML="";

  artigos.forEach((a, i)=>{
    lista.innerHTML += `
      <div class="card">
        <h3>${a.titulo}</h3>
        <p>${a.descricao}</p>
      </div>
    `;

    adminLista.innerHTML += `
      <div class="card">
        <strong>${a.titulo}</strong>
        <p>${a.descricao}</p>
        <button onclick="remover(${i})">Excluir</button>
      </div>
    `;
  });
}

function add(){
  let titulo = document.getElementById("titulo").value;
  let descricao = document.getElementById("descricao").value;

  if(!titulo) return;

  artigos.push({titulo, descricao});
  salvar();
  render();

  document.getElementById("titulo").value="";
  document.getElementById("descricao").value="";
}

function remover(i){
  artigos.splice(i,1);
  salvar();
  render();
}

function toggleAdmin(){
  let site = document.getElementById("site");
  let admin = document.getElementById("admin");

  if(site.style.display === "none"){
    site.style.display = "block";
    admin.style.display = "none";
  }else{
    site.style.display = "none";
    admin.style.display = "block";
  }
}

render();
</script>

</body>
</html>
